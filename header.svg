<svg viewBox="0 0 1200 300" width="1200" height="300" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="height:300px;width:100%;position:relative;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:radial-gradient(ellipse at 75% 120%,#0a1628 0%,#060d18 30%,#030508 70%);">

      <style>
        /* === NETWORK NODES BACKGROUND === */
        .node{position:absolute;border-radius:50%;z-index:1}
        .n1{background:rgba(88,166,255,0.15);box-shadow:0 0 6px rgba(88,166,255,0.1)}
        .n2{background:rgba(31,111,235,0.1);box-shadow:0 0 4px rgba(31,111,235,0.08)}
        .n3{background:rgba(140,180,255,0.08)}
        .nline{position:absolute;height:1px;transform-origin:left center;z-index:0}
        .nl1{background:linear-gradient(90deg,rgba(88,166,255,0.12),rgba(88,166,255,0.03))}
        .nl2{background:linear-gradient(90deg,rgba(31,111,235,0.08),transparent)}

        @keyframes npulse{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
        @keyframes flow{0%{background-position:0% 0%}100%{background-position:200% 0%}}

        /* === EARTH === */
        .earth-container{position:absolute;right:-60px;bottom:-180px;width:420px;height:420px;z-index:2}
        .earth{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 35% 35%,#1a4a7a 0%,#0d2847 25%,#0a1f3d 45%,#061428 65%,#030a15 100%);box-shadow:inset -20px -10px 60px rgba(0,0,0,0.8),inset 5px 5px 30px rgba(88,166,255,0.08);position:relative;overflow:hidden}
        .earth-land1{position:absolute;width:80px;height:45px;background:rgba(34,120,80,0.15);border-radius:50% 60% 40% 50%;top:28%;left:25%;filter:blur(3px)}
        .earth-land2{position:absolute;width:60px;height:35px;background:rgba(34,120,80,0.12);border-radius:40% 50% 60% 45%;top:42%;left:38%;filter:blur(3px)}
        .earth-land3{position:absolute;width:40px;height:25px;background:rgba(34,120,80,0.1);border-radius:50%;top:55%;left:22%;filter:blur(2px)}
        .earth-cloud1{position:absolute;width:120px;height:15px;background:rgba(255,255,255,0.06);border-radius:50%;top:30%;left:15%;filter:blur(4px)}
        .earth-cloud2{position:absolute;width:80px;height:10px;background:rgba(255,255,255,0.05);border-radius:50%;top:50%;left:35%;filter:blur(3px)}

        /* atmosphere glow */
        .atmosphere{position:absolute;top:-8px;left:-8px;right:-8px;bottom:-8px;border-radius:50%;background:transparent;box-shadow:0 0 40px 8px rgba(88,166,255,0.08),0 0 80px 15px rgba(31,111,235,0.04);z-index:1}
        @keyframes atmglow{0%,100%{box-shadow:0 0 40px 8px rgba(88,166,255,0.08),0 0 80px 15px rgba(31,111,235,0.04)}50%{box-shadow:0 0 50px 10px rgba(88,166,255,0.12),0 0 100px 20px rgba(31,111,235,0.06)}}

        /* === SATELLITE ORBITS === */
        .orbit-path{position:absolute;border:1px solid rgba(88,166,255,0.1);border-radius:50%;z-index:3}
        .orbit-path-dash{border-style:dashed;border-color:rgba(88,166,255,0.07)}

        /* orbit 1: tight low orbit */
        .orb-1{width:480px;height:480px;right:-90px;bottom:-238px;transform:rotate(-15deg)}
        /* orbit 2: medium orbit */
        .orb-2{width:560px;height:560px;right:-130px;bottom:-280px;transform:rotate(10deg)}
        /* orbit 3: wide scanning orbit */
        .orb-3{width:660px;height:660px;right:-180px;bottom:-330px;transform:rotate(-5deg)}

        /* satellites */
        .sat{position:absolute;border-radius:50%;z-index:4}
        @keyframes sat1{0%{transform:rotate(0deg) translateX(240px) rotate(0deg)}100%{transform:rotate(360deg) translateX(240px) rotate(-360deg)}}
        @keyframes sat2{0%{transform:rotate(0deg) translateX(280px) rotate(0deg)}100%{transform:rotate(360deg) translateX(280px) rotate(-360deg)}}
        @keyframes sat3{0%{transform:rotate(0deg) translateX(330px) rotate(0deg)}100%{transform:rotate(360deg) translateX(330px) rotate(-360deg)}}

        .sat1{width:4px;height:4px;background:#58a6ff;box-shadow:0 0 8px 2px rgba(88,166,255,0.6),0 0 20px 4px rgba(88,166,255,0.2);position:absolute;top:50%;left:50%;margin:-2px;animation:sat1 18s linear infinite;z-index:5}
        .sat2{width:3px;height:3px;background:#7ee787;box-shadow:0 0 6px 2px rgba(126,231,135,0.5),0 0 16px 3px rgba(126,231,135,0.15);position:absolute;top:50%;left:50%;margin:-1.5px;animation:sat2 28s linear infinite reverse;z-index:5}
        .sat3{width:3px;height:3px;background:#f0883e;box-shadow:0 0 6px 2px rgba(240,136,62,0.4),0 0 14px 3px rgba(240,136,62,0.12);position:absolute;top:50%;left:50%;margin:-1.5px;animation:sat3 40s linear infinite;z-index:5}

        /* scanning beam from sat1 */
        @keyframes scan{0%,100%{opacity:0}20%,80%{opacity:1}}

        /* === STARS === */
        .s{position:absolute;border-radius:50%;z-index:1}
        @keyframes tw{0%,100%{opacity:.15;transform:scale(.8)}50%{opacity:.9;transform:scale(1.3)}}
        @keyframes tw2{0%,100%{opacity:.08;transform:scale(.6)}50%{opacity:.6;transform:scale(1)}}

        /* === TEXT === */
        .info{position:absolute;z-index:10;top:50%;left:70px;transform:translateY(-50%)}
        .nm{color:#e6edf3;font-size:38px;font-weight:700;letter-spacing:-0.5px;margin:0;line-height:1.2;text-shadow:0 2px 20px rgba(0,0,0,0.9)}
        .sub{color:#8b949e;font-size:14px;font-weight:400;margin:8px 0 0 0;letter-spacing:0.5px;text-shadow:0 1px 8px rgba(0,0,0,0.9)}
        .acc{color:#58a6ff}
        .tags{margin-top:16px;display:flex;gap:8px}
        .tag{padding:3px 10px;border:1px solid rgba(88,166,255,0.25);border-radius:16px;color:#58a6ff;font-size:10px;letter-spacing:1px;text-transform:uppercase;background:rgba(88,166,255,0.06)}
        .tag-g{border-color:rgba(126,231,135,0.25);color:#7ee787;background:rgba(126,231,135,0.06)}
      </style>

      <!-- Network nodes background -->
      <div class="node n1" style="top:15%;left:8%;width:4px;height:4px;animation:npulse 4s 0s infinite"></div>
      <div class="node n2" style="top:40%;left:3%;width:3px;height:3px;animation:npulse 5s 1s infinite"></div>
      <div class="node n1" style="top:75%;left:12%;width:3px;height:3px;animation:npulse 4.5s 2s infinite"></div>
      <div class="node n2" style="top:25%;left:22%;width:4px;height:4px;animation:npulse 5s 0.5s infinite"></div>
      <div class="node n3" style="top:60%;left:18%;width:3px;height:3px;animation:npulse 6s 1.5s infinite"></div>
      <div class="node n1" style="top:85%;left:28%;width:3px;height:3px;animation:npulse 4s 2.5s infinite"></div>
      <div class="node n2" style="top:10%;left:38%;width:4px;height:4px;animation:npulse 5.5s 0.8s infinite"></div>
      <div class="node n3" style="top:50%;left:42%;width:3px;height:3px;animation:npulse 4s 1.8s infinite"></div>
      <div class="node n1" style="top:30%;left:48%;width:3px;height:3px;animation:npulse 5s 3s infinite"></div>
      <div class="node n2" style="top:70%;left:35%;width:4px;height:4px;animation:npulse 4.5s 0.3s infinite"></div>
      <div class="node n3" style="top:20%;left:55%;width:3px;height:3px;animation:npulse 6s 2.2s infinite"></div>
      <div class="node n1" style="top:90%;left:50%;width:3px;height:3px;animation:npulse 5s 1.2s infinite"></div>

      <!-- Network connection lines -->
      <div class="nline nl1" style="top:16%;left:8.5%;width:170px;transform:rotate(12deg)"></div>
      <div class="nline nl2" style="top:41%;left:3.5%;width:120px;transform:rotate(-25deg)"></div>
      <div class="nline nl1" style="top:26%;left:22.5%;width:200px;transform:rotate(8deg)"></div>
      <div class="nline nl2" style="top:61%;left:18.5%;width:130px;transform:rotate(20deg)"></div>
      <div class="nline nl1" style="top:75%;left:13%;width:180px;transform:rotate(-15deg)"></div>
      <div class="nline nl2" style="top:11%;left:38.5%;width:100px;transform:rotate(35deg)"></div>
      <div class="nline nl1" style="top:50%;left:42.5%;width:110px;transform:rotate(-10deg)"></div>
      <div class="nline nl2" style="top:30%;left:48.5%;width:90px;transform:rotate(18deg)"></div>

      <!-- Twinkling stars -->
      <div class="s" style="top:8%;left:2%;width:1.5px;height:1.5px;background:#fff;animation:tw 3.5s 0s infinite"></div>
      <div class="s" style="top:35%;left:30%;width:1px;height:1px;background:#fff;animation:tw2 4s 1.5s infinite"></div>
      <div class="s" style="top:5%;left:52%;width:2px;height:2px;background:rgba(140,180,255,0.8);animation:tw 5s 0.7s infinite"></div>
      <div class="s" style="top:45%;left:58%;width:1.5px;height:1.5px;background:#fff;animation:tw 3s 2s infinite"></div>
      <div class="s" style="top:15%;left:65%;width:1px;height:1px;background:#fff;animation:tw2 4.5s 1s infinite"></div>
      <div class="s" style="top:80%;left:60%;width:1.5px;height:1.5px;background:rgba(255,200,140,0.7);animation:tw 5.5s 2.5s infinite"></div>

      <!-- Earth -->
      <div class="earth-container">
        <div class="atmosphere" style="animation:atmglow 6s ease-in-out infinite"></div>
        <div class="earth">
          <div class="earth-land1"></div>
          <div class="earth-land2"></div>
          <div class="earth-land3"></div>
          <div class="earth-cloud1"></div>
          <div class="earth-cloud2"></div>
        </div>
      </div>

      <!-- Satellite orbits -->
      <div class="orbit-path orb-1">
        <div class="sat1"></div>
      </div>
      <div class="orbit-path orbit-path-dash orb-2">
        <div class="sat2"></div>
      </div>
      <div class="orbit-path orb-3">
        <div class="sat3"></div>
      </div>

      <!-- Text -->
      <div class="info">
        <div class="nm">Kanugu Manoj Kumar</div>
        <div class="sub">Geospatial Systems <span class="acc">&#183;</span> Data Engineering <span class="acc">&#183;</span> ML Pipelines</div>
        <div class="tags">
          <span class="tag">Published Researcher</span>
          <span class="tag-g tag">B.Tech IT</span>
          <span class="tag">CGPA 8.21</span>
        </div>
      </div>

    </div>
  </foreignObject>
</svg>